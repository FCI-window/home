<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAB 앱으로 이동</title>
  <script>
    const IOS_URL = "https://apps.apple.com/kr/app/성경낭독녹음/id1554443046";
    const ANDROID_URL = "https://play.google.com/store/apps/details?id=life.fci.recordaloudbible&hl=ko";
    const FALLBACK_URL = "https://fciapp.com/";

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(ua)) {
      window.location.replace(ANDROID_URL);
    } else if (/iPhone|iPad|iPod/i.test(ua)) {
      window.location.replace(IOS_URL);
    } else {
      window.location.replace(FALLBACK_URL);
    }
  </script>
</head>
<body>
  <p>앱 스토어로 이동 중입니다...</p>
</body>
</html>
