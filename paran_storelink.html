<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>파란 설치</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
      line-height: 1.5;
      text-align: center;
    }
    a {
      display: block;
      margin: 12px 0;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>스토어로 이동 중…</h2>
  <p>자동으로 이동하지 않으면 아래를 눌러주세요.</p>

  <a id="aos" href="#">Android (Google Play)</a>
  <a id="ios" href="#">iOS (App Store)</a>

  <script>
    // ✅ 여기만 수정
    const PLAY_URL = "https://play.google.com/store/apps/details?id=com.fciapp.TMOStory";
    const APPSTORE_URL = "https://apps.apple.com/kr/app/id1234567890";

    const ua = navigator.userAgent || "";
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);

    document.getElementById("aos").href = PLAY_URL;
    document.getElementById("ios").href = APPSTORE_URL;

    let target = PLAY_URL;
    if (isIOS) target = APPSTORE_URL;

    // 즉시 이동
    window.location.replace(target);
  </script>
</body>
</html>
